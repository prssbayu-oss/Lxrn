<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LXRN Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 600px;
        }
        .lxrn-badge {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }
        .version {
            color: #8892b0;
            font-size: 0.9rem;
            margin: 0.5rem 0 1.5rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 300;
        }
        .status {
            display: inline-block;
            background: #00d4ff22;
            color: #00d4ff;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            border: 1px solid #00d4ff44;
            font-size: 0.9rem;
            margin: 1rem 0;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        .btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background: linear-gradient(45deg, #00d4ff, #7b2ffc);
            border: none;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        #output {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #64ffda;
            min-height: 60px;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #495670;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lxrn-badge">LXRN</div>
        <div class="version">Luxarion Server v1.0.0</div>
        <h1>Native Node.js HTTP Server</h1>
        <div class="status">● LXRN Active</div>
        <p style="color: #8892b0; margin: 1rem 0;">
            Built with pure Node.js<br>
            No external dependencies
        </p>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="fetchLXRN()">Get LXRN Info</button>
            <button class="btn" onclick="fetchStatus()">Server Status</button>
            <button class="btn" onclick="clearOutput()">Clear</button>
        </div>
        <div id="output">Click a button to interact with LXRN server...</div>
        <div class="footer">
            LXRN &copy; 2026 - Powered by Node.js
        </div>
    </div>

    <script>
        async function fetchLXRN() {
            const output = document.getElementById('output');
            output.textContent = 'Loading LXRN data...';
            try {
                const response = await fetch('/api/lxrn');
                const data = await response.json();
                output.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                output.textContent = 'Error: ' + error.message;
            }
        }

        async function fetchStatus() {
            const output = document.getElementById('output');
            output.textContent = 'Loading status...';
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                output.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                output.textContent = 'Error: ' + error.message;
            }
        }

        function clearOutput() {
            document.getElementById('output').textContent = 'Ready for LXRN commands...';
        }
    </script>
</body>
</html>
